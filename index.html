<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Moderna</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header class="cabecalho">
        <img id="icone" src="Imagens/icone_barbearia.png" width="50px">
        <nav class="menu">
            <a class="menu">Home</a>
            <a class="menu">Produtos</a>
            <a href="#sobre" class="menu">Sobre</a>
            <a class="menu">Contato</a>
        </nav> 
    </header>
    
    <div id="container">
        <img src="Imagens/cores_barbearia.jpg" id="fotoCores">
    </div>

    <div id="blog">
        <h1 id="palavra-blog">BLOG</h1>
    </div>
    
    <div class="grid">
        <div class="card">
            <div class="card-img">
                <img src="https://images.pexels.com/photos/6487888/pexels-photo-6487888.jpeg" alt="Cortes">
            </div>
            <div class="card-body">
                <h3 class="card-title">Cortes</h3>
                <p class="card-text"><strong>Os mais variados tipos de cortes!</strong></p>
            </div>
        </div>
        
        <div class="card">
            <div class="card-img">
                <img src="https://images.pexels.com/photos/6007395/pexels-photo-6007395.jpeg" alt="Barba">
            </div>
            <div class="card-body">
                <h3 class="card-title">Outros serviços</h3>
                <p class="card-text"><strong>Sombrancelha, Barba e muito mais!</strong></p>
        </div>
    </div>

    <div class="card">
        <div class="card-img">
            <img src="https://images.pexels.com/photos/7447130/pexels-photo-7447130.jpeg" alt="Produtos">
        </div>
        <div class="card-body">
            <h3 class="card-title">Produtos</h3>
            <p class="card-text"><strong>Para cabelos de todos os tipos!</strong></p>
        </div>
    </div>
    </div>

    <div id="contato">
        <h1 id="palavra-contato">CONVERSE COM A GENTE!</h1>
    </div>
    
</body>
</html>
