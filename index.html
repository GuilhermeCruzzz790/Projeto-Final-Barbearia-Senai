<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Moderna</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="Imagens/icone_barbearia.png" type="image/x-icon">
</head>

<body>

    <header class="cabecalho">

        <div class="logo">
            <img src="Imagens/icone_barbearia.png" width="50px">
            <a class="animacao-de-palavra">404 Barber Not Found</a>
        </div>

        <nav class="menu">
            <a href="index.html" class="animacao-de-palavra">Home</a>
            <a href="./produtos.html" class="animacao-de-palavra">Produtos</a>
            <a href="./sobre.html" class="animacao-de-palavra" id="sobre">Sobre</a>
            <a href="cortes.html" class="animacao-de-palavra">Cortes</a>
            <a href="serviços.html" class="animacao-de-palavra">Serviços</a>
        </nav>
    </header>

    <div id="container">
        <img src="Imagens/cores_barbearia.jpg" id="fotoCores">
    </div>

    <div id="blog">
        <h1 class="animacao-de-palavra">Blog</h1>
    </div>

    <div class="grid">
        <div class="card">
            <div class="card-img">
                <a href="cortes.html">
                    <img src="https://images.pexels.com/photos/6487888/pexels-photo-6487888.jpeg" alt="Cortes">
                </a>
            </div>
            <div class="card-body">
                <h3 class="card-title">Cortes</h3>
                <p class="card-text"><strong>Os mais variados tipos de cortes!</strong></p>
            </div>
        </div>
        
        <div class="card">
            <div class="card-img" href="barba.html">
                <a href="produtos.html">
                    <img src="https://images.pexels.com/photos/7447130/pexels-photo-7447130.jpeg" alt="Produtos">
                </a>
            </div>
            <div class="card-body">
                <h3 class="card-title">Produtos</h3>
                <p class="card-text"><strong>Para cabelos de todos os tipos!</strong></p>
            </div>
        </div>
        
        <div class="card">
            <div class="card-img" href="serviços.html">
                <a href="serviços.html">
                    <img src="https://images.pexels.com/photos/6007395/pexels-photo-6007395.jpeg" alt="Barba">
                </a>
            </div>
            <div class="card-body">
                <h3 class="card-title">Outros serviços</h3>
                <p class="card-text"><strong>Sombrancelha, Barba e muito mais!</strong></p>
            </div>
        </div>
    </div>

    <div id="contato">
        <h1 class="animacao-de-palavra">Converse com a gente!</h1>
    </div>


    <section>

        <form id="form">

            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required>

            <label for="email">Email:</label>
            <input type="email" id="Email" placeholder="Digite seu email" required>

            <label for="telefone">Telefone:</label>
            <input type="number" id="Telefone" placeholder="Digite seu telefone" required>

            <label for="duvidas">Dúvidas:</label>
            <input type="text" id="duvidas" placeholder="Digite suas dúvidas">

            <button type="submit" id="button">Enviar</button>

        </form>

    </section>
    <div id="end">
        <p>Curso JavaScript</p>
        <img src="./Imagens/SENAI_São_Paulo_logo.png" alt="logoSenai" width="200px">
    </div>

    <script src="script.js"></script>
    
</body>

</html>
