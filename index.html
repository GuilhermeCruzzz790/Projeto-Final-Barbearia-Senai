<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Moderna</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header class="cabecalho">
        <img id="icone" src="Imagens/icone_barbearia.png" width="50px">
        <nav class="menu">
            <a class="animacao-de-palavra">Home</a>
            <a class="animacao-de-palavra">Produtos</a>
            <a href="#sobre" class="animacao-de-palavra">Sobre</a>
            <a class="animacao-de-palavra">Contato</a>
        </nav> 
    </header>
    
    <div id="container">
        <img src="Imagens/cores_barbearia.jpg" id="fotoCores">
    </div>

    <div id="blog">
        <h1 class="animacao-de-palavra">BLOG</h1>
    </div>
    
    <div class="grid">
        <div class="card">
            <div class="card-img">
                <img src="https://images.pexels.com/photos/6487888/pexels-photo-6487888.jpeg" alt="Cortes">
            </div>
            <div class="card-body">
                <h3 class="card-title">Cortes</h3>
                <p class="card-text"><strong>Os mais variados tipos de cortes!</strong></p>
            </div>
        </div>
        
        <div class="card">
            <div class="card-img">
                <img src="https://images.pexels.com/photos/6007395/pexels-photo-6007395.jpeg" alt="Barba">
            </div>
            <div class="card-body">
                <h3 class="card-title">Outros serviços</h3>
                <p class="card-text"><strong>Sombrancelha, Barba e muito mais!</strong></p>
        </div>
    </div>

    <div class="card">
        <div class="card-img">
            <img src="https://images.pexels.com/photos/7447130/pexels-photo-7447130.jpeg" alt="Produtos">
        </div>
        <div class="card-body">
            <h3 class="card-title">Produtos</h3>
            <p class="card-text"><strong>Para cabelos de todos os tipos!</strong></p>
        </div>
    </div>
    </div>

    <div id="contato">
        <h1 class="animacao-de-palavra">CONVERSE COM A GENTE!</h1>
    </div>

   
<section>

    <form id="form">

        <label for="nome">Nome:</label>
        <input type="text" id="nome" required>

        <label for="email">Email:</label>
        <input type="email" id="Email" required>

        <label for="telefone">Telefone:</label>
        <input type="number" id="Telefone" required>

        <label for="duvidas">Dúvidas:</label>
        <input type="text" id="duvidas">

        <button type="submit">Enviar</button>
    </form>
</section>



</body>
</html>
